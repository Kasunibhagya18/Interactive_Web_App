<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeMeter - Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Your CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
            <div class="logo-box">
                <img src="https://cdn3d.iconscout.com/3d/premium/thumb/typing-keyboard-3d-icon-png-download-6805473.png" class="logo-img">
            </div>
            <span class="ms-2 fw-bold gradient-text">TypeMeter</span>
        </a>
    </div>
</nav>

<!-- REGISTER FORM -->
<div class="container py-5">
<div class="row justify-content-center">
<div class="col-md-6 col-lg-5">

<div class="card glass-card">
<div class="card-body p-4 p-md-5">

    <div class="text-center mb-4">
        <div class="logo-box mx-auto mb-3" style="width:60px;height:60px;">
            <i class="fas fa-user-plus" style="font-size:30px;"></i>
        </div>
        <h2 class="gradient-text">Create Account</h2>
        <p class="text-muted">Sign up to track your typing progress</p>
    </div>

    <!-- FORM -->
    <form action="auth/register.php" method="POST">

        <!-- Username -->
        <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fas fa-user"></i>
                </span>
                <input type="text" name="username" class="form-control" required>
            </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fas fa-envelope"></i>
                </span>
                <input type="email" name="email" class="form-control" required>
            </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fas fa-lock"></i>
                </span>
                <input type="password" name="password" class="form-control" required>
            </div>
        </div>

        <!-- BUTTON -->
        <button type="submit" class="btn btn-gradient w-100">
            <i class="fas fa-user-plus me-2"></i>Register
        </button>

    </form>

    <hr class="my-4">

    <!-- LOGIN LINK -->
    <div class="text-center">
        <p class="small text-muted">
            Already have an account?
            <a href="login.html" class="text-purple">Login</a>
        </p>
    </div>

</div>
</div>

</div>
</div>
</div>

</body>
</html>
